# vim like
## pane separate (new window inserts right after current, then compact gaps)
bind c new-window -a -c "#{pane_current_path}" \; move-window -r
bind s split-window -c "#{pane_current_path}" -v
bind v split-window -c "#{pane_current_path}" -h

## pane move
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

## pane resize
bind -r H resize-pane -L 5
bind -r J resize-pane -D 3
bind -r K resize-pane -U 3
bind -r L resize-pane -R 5

## pane swap
bind C-h run 'cur="#{pane_id}"; tmux select-pane -L; tmux swap-pane -s "$cur"'
bind C-j run 'cur="#{pane_id}"; tmux select-pane -D; tmux swap-pane -s "$cur"'
bind C-k run 'cur="#{pane_id}"; tmux select-pane -U; tmux swap-pane -s "$cur"'
bind C-l run 'cur="#{pane_id}"; tmux select-pane -R; tmux swap-pane -s "$cur"'

## pane equalize (vim Ctrl-W =)
bind = select-layout -E

## paste buffer (default: prefix + =)
bind B choose-buffer -Z

## pane index
bind t select-window -t :+
bind T select-window -t :-

## window move without prefix (C-,/C-. need extended-keys; iTerm2 supports CSI u)
set -s extended-keys on
set -as terminal-features 'xterm*:extkeys'
bind -n C-, previous-window
bind -n C-. next-window
## Alt variants for terminals without CSI u (e.g. Windows Terminal)
bind -n M-, previous-window
bind -n M-. next-window

## window rename (start with empty prompt instead of current name)
bind , command-prompt -p "(rename-window)" "rename-window -- '%%'"

## session fuzzy switch (fzf popup; double-tap C-b, overrides send-prefix)
## sessions with a bell window (agent waiting for input) are highlighted
bind C-b display-popup -E -w 90% -h 80% 'bash ~/.local/bin/tmux-session-picker'

## session kill (current; y=confirm / any other key=cancel)
bind X confirm-before -p "kill session #S? [y/N]" kill-session

## copy mode
setw -g mode-keys vi

# window style
set -g window-status-activity-style bg="cyan","bold",fg="black"
set -g pane-active-border-style bg="cyan",fg="black"

# window base number to 1
set -g base-index 1

# auto-renumber windows when one is closed (keeps numbers contiguous)
set -g renumber-windows on

# reload
bind r source-file ~/.config/tmux/tmux.conf \; display-message "Reload Config!!"
if-shell "uname | grep -q Darwin" "source-file $HOME/.config/tmux/tmux.osx.conf" ""

# refresh screen (pass C-k to vim, clear history otherwise)
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|l?n?vim?x?)(diff)?$'"
bind -n C-k if-shell "$is_vim" 'send-keys C-k' 'clear-history'

# resurrect
set -g @resurrect-strategy-vim 'session'

# allow programs inside tmux to send escape sequences through
set -g allow-passthrough on

# mouse: pane 単位の選択/スクロール (端末ネイティブ選択は Shift+ドラッグ)
set -g mouse on
## copy-mode のコピーを OSC 52 で端末側クリップボードへ (SSH 越しでも効く)
set -as terminal-features 'xterm*:clipboard'

# bell monitoring (notify on agent turn end)
set -wg monitor-bell on
## any: セッションのアクティブウィンドウ (claude は大抵ここにいる) のベルも
## 別セッションから見えるように拾う
set -g bell-action any
set -g visual-bell off

# status-line
set -g status-bg "colour232"
set -g status-fg "colour255"
set -g status-left-length 30
set -g status-left "#[fg=colour246][#S] #[default]"
## bell sessions (agents waiting for input) listed left of the clock
## session_alerts はアタッチ中セッションのカレントウィンドウでは記録されないので
## emit-turn-end.sh が立てる @agent_bell も併せて見る
set -g status-right-length 100
set -g status-right '#{S:#{?#{||:#{m:*!*,#{session_alerts}},#{@agent_bell}},#[fg=colour255#,bg=colour24#,bold] #S #[default] ,}}#[fg=colour242][%Y-%m-%d(%a) %H:%M]#[default]'
## ユーザーがそのセッションを見に行ったら @agent_bell を消灯する
## あわせて後勝ちアタッチ: 新しく繋いだ端末以外の全クライアントを蹴る
## (放置アタッチが残らないので bell アラート抑制問題の根本対策にもなる)
set-hook -g client-attached 'set @agent_bell 0 ; detach-client -a'
set-hook -g client-session-changed 'set @agent_bell 0'
set-hook -g session-window-changed 'set @agent_bell 0'
setw -g window-status-format "#{?window_bell_flag,#[bg=colour24]#[fg=colour255]#[bold],}#I:#W #[default]"

# List of plugins
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

# Auto install tpm and plugins
if-shell "test ! -d ~/.tmux/plugins/tpm" \
   "run 'git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm'"
run '~/.tmux/plugins/tpm/tpm'
run '~/.tmux/plugins/tpm/bin/install_plugins'
