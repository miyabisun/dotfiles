# Personal Codex defaults. Authentication, history, and runtime databases
# intentionally stay outside this repository.
model_reasoning_effort = "medium"
personality = "pragmatic"
approval_policy = "on-request"
approvals_reviewer = "auto_review"
sandbox_mode = "workspace-write"
web_search = "live"
notify = ["notify-turn-end.sh"]

[features]
hooks = true
multi_agent = true

[agents]
max_threads = 6
max_depth = 2

[agents.leader]
description = "複雑な依頼を観測可能な達成条件、スコープ、リスクへ変換する。"
config_file = "agents/leader.toml"

[agents.designer]
description = "UI/UX とデザインシステムの達成条件を定義する。"
config_file = "agents/designer.toml"

[agents.strategist]
description = "複雑・高リスク変更の実装非依存な検証契約とテストを設計する。"
config_file = "agents/strategist.toml"

[agents.strategy_rev]
description = "達成条件と検証契約が独立して合否判定できるか検査する。"
config_file = "agents/strategy-rev.toml"

[agents.dev]
description = "達成条件を満たす最小の変更を実装し、検証証拠を返す。"
config_file = "agents/dev.toml"

[agents.rev]
description = "依頼、達成条件、diff、証拠を照合してコミット可否を判定する。"
config_file = "agents/rev.toml"

[agents.debugger]
description = "レビュー指摘をすべて修正し、回帰検証する。"
config_file = "agents/debugger.toml"

[agents.inspector]
description = "指摘事項が漏れなく解消されたか検品する。"
config_file = "agents/inspector.toml"

[agents.sec]
description = "変更のセキュリティリスクを検証する。"
config_file = "agents/sec.toml"

[agents.ui_checker]
description = "UI を実測し、証拠付きで達成条件を検証する。"
config_file = "agents/ui-checker.toml"

[agents.formatter]
description = "eligibleな実装sourceのformatter/linter適用判定と最終検査を行う。"
config_file = "agents/formatter.toml"

[agents.docs]
description = "実装済みの挙動を一次情報にドキュメントを執筆し、実行証拠と出典を返す。"
config_file = "agents/docs.toml"

[agents.committer]
description = "合格済みdelivery ledgerの対象ファイルだけを1件コミットする。"
config_file = "agents/committer.toml"

[mcp_servers.obscura]
command = "obscura"
args = ["mcp"]
required = false

[mcp_servers.openaiDeveloperDocs]
url = "https://developers.openai.com/mcp"

[tui]
# Completion and approval notifications use emit-turn-end.sh so tmux's
# @agent_bell and MOCA_URL share one path without duplicate TUI BELs.
notifications = false

[sandbox_workspace_write]
network_access = false
